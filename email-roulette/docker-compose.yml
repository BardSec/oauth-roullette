services:
  email-roulette:
    build: .
    container_name: email-roulette
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    restart: unless-stopped
    # Read-only root filesystem — nothing in the app writes to disk
    read_only: true
    # Express-session uses in-memory storage (no disk writes needed)
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/me', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
